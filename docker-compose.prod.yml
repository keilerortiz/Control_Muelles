version: '3.9'

services:
  backend:
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      ENABLE_DOCS: "false"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  frontend:
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  db:
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
